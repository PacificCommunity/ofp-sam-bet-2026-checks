name: ofp-sam-bet-2026-check-jitter-merge
description: Merge split mfclkit jitter checks after parallel jitter jobs complete.
command: bash run.sh
target_folder: jitter-merge
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.0
resources:
  cpus: 2
  memory: 12GB
  disk: 10GB
env:
  CHECK_TYPE: jitter-merge
  CHECK_MERGE_TYPE: jitter
  MODEL_SELECTOR: ""
  PROGRAM_PATH: /home/mfcl/mfclo64
  KFLOW_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@main,mfclshiny=PacificCommunity/mfclshiny@main
  KFLOW_REPO_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: always
  TUNA_FLOW_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS: "0"
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
output_patterns:
  - outputs/**
metadata:
  job_config:
    optional:
      - CHECK_TYPE
      - CHECK_MERGE_TYPE
      - MODEL_SELECTOR
      - MODEL_INPUT_ROOT
      - PROGRAM_PATH
      - FLOW_GROUP
      - CHECK_BUILD_REPORT_FIGURES
      - CHECK_REPORT_FIGURE_KEYS
      - CHECK_RENDER_REVIEW_HTML
      - MFK_RUN_MESSAGES
      - KFLOW_RUNTIME_UPDATE
      - TUNA_FLOW_RUNTIME_UPDATE
      - KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS
      - KFLOW_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_UPDATE
      - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
      - KFLOW_RUNTIME_GITHUB_AUTH
      - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
tags:
  stage: checks
  check_type: jitter-merge
