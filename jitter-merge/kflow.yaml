name: ofp-sam-bet-2026-check-jitter-merge
description: Merge split mfclkit jitter checks and optionally publish an independent attached diagnostic delta.
command: bash run.sh
target_folder: jitter-merge
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.4
resources:
  cpus: 1
  memory: 4GB
  disk: 10GB
env:
  CHECK_TYPE: jitter-merge
  CHECK_MERGE_TYPE: jitter
  CHECK_EXPECTED_UNIT_TYPE: ""
  CHECK_EXPECTED_UNITS: ""
  MODEL_SELECTOR: ""
  MODEL_BASE_INPUT_JOB: ""
  BASE_MODEL_JOB: ""
  MODEL_ORIGINAL_BASE_INPUT_JOB: ""
  ATTACH_OUTPUT_MODE: full
  CHECK_INPUT_JOBS: ""
  ATTACH_CHECK_TYPES: jitter
  PROGRAM_PATH: /home/mfcl/mfclo64
  KFLOW_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@963e6f18e70b54fafb3c072ce454f14d6b076821,mfclshiny=PacificCommunity/mfclshiny@558ca51f50d8afb02f537cc6eac9021b232567ce
  KFLOW_REPO_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: always
  TUNA_FLOW_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS: "0"
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  CHECK_COMPACT_OUTPUTS: "true"
  CHECK_ENRICH_PAYLOADS: "true"
  CHECK_KEEP_RAW_OUTPUTS: "false"
output_patterns:
  - outputs/**
metadata:
  job_config:
    optional:
      - CHECK_TYPE
      - CHECK_MERGE_TYPE
      - CHECK_EXPECTED_UNIT_TYPE
      - CHECK_EXPECTED_UNITS
      - CHECK_COMPACT_OUTPUTS
      - CHECK_ENRICH_PAYLOADS
      - CHECK_KEEP_RAW_OUTPUTS
      - MODEL_SELECTOR
      - MODEL_BASE_INPUT_JOB
      - BASE_MODEL_JOB
      - MODEL_ORIGINAL_BASE_INPUT_JOB
      - ATTACH_OUTPUT_MODE
      - CHECK_INPUT_JOBS
      - ATTACH_CHECK_TYPES
      - MODEL_INPUT_ROOT
      - PROGRAM_PATH
      - FLOW_GROUP
      - FLOW_SPECIES
      - FLOW_SPECIES_LABEL
      - FLOW_ASSESSMENT_YEAR
      - CHECK_BUILD_REPORT_FIGURES
      - CHECK_REPORT_FIGURE_KEYS
      - CHECK_RENDER_REVIEW_HTML
      - MFK_RUN_MESSAGES
      - KFLOW_RUNTIME_UPDATE
      - TUNA_FLOW_RUNTIME_UPDATE
      - KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS
      - KFLOW_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_UPDATE
      - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
      - KFLOW_RUNTIME_GITHUB_AUTH
      - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
tags:
  stage: checks
  check_type: jitter-merge
