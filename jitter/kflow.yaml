name: ofp-sam-bet-2026-check-jitter
description: Run mfclkit jitter checks on a fitted MFCL model output.
command: bash run.sh
target_folder: jitter
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.1
resources:
  cpus: 2
  memory: 12GB
  disk: 10GB
env:
  CHECK_TYPE: jitter
  MODEL_SOURCE_REPO: PacificCommunity/ofp-sam-bet-2026-stepwise
  MODEL_SOURCE_REF: main
  PROGRAM_PATH: /home/mfcl/mfclo64
  KFLOW_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@main,mfclshiny=PacificCommunity/mfclshiny@66ced746ab734f350a183e9790df980e0250f3df
  KFLOW_REPO_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: always
  TUNA_FLOW_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS: "0"
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  CHECK_COMPACT_OUTPUTS: "true"
  CHECK_ENRICH_PAYLOADS: "true"
  CHECK_KEEP_RAW_OUTPUTS: "false"
  JITTER_SEEDS: "1"
  JITTER_CV: "0.2"
  JITTER_SLOTS: ""
  BET_JITTER_MAX_EVALS: "5000"
output_patterns:
  - outputs/**
metadata:
  job_config:
    optional:
      - CHECK_TYPE
      - MODEL_SELECTOR
      - MODEL_INPUT_ROOT
      - MODEL_SOURCE_REPO
      - MODEL_SOURCE_REF
      - MODEL_SOURCE_PATH
      - MODEL_SOURCE_ROOT
      - MODEL_FINAL_PAR
      - CHECK_START_PAR_NAME
      - PROGRAM_PATH
      - FLOW_GROUP
      - CHECK_DRY_RUN
      - CHECK_SMOKE_ONLY
      - CHECK_BUILD_REPORT_FIGURES
      - CHECK_REPORT_FIGURE_KEYS
      - CHECK_RENDER_REVIEW_HTML
      - CHECK_COMPACT_OUTPUTS
      - CHECK_ENRICH_PAYLOADS
      - CHECK_KEEP_RAW_OUTPUTS
      - JITTER_SEEDS
      - JITTER_SEED
      - JITTER_CV
      - JITTER_SLOTS
      - BET_JITTER_MAX_EVALS
      - BET_PHASE10_11_CONVERGENCE
      - MFK_RUN_MESSAGES
      - KFLOW_RUNTIME_UPDATE
      - TUNA_FLOW_RUNTIME_UPDATE
      - KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS
      - KFLOW_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_UPDATE
      - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
      - KFLOW_RUNTIME_GITHUB_AUTH
      - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
tags:
  stage: checks
  check_type: jitter
