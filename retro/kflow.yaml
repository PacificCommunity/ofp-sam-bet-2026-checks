name: ofp-sam-bet-2026-check-retro
description: Run mfclkit retrospective checks on a fitted MFCL model output.
command: bash run.sh
target_folder: retro
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.2
resources:
  cpus: 2
  memory: 12GB
  disk: 10GB
env:
  CHECK_TYPE: retro
  MODEL_SOURCE_REPO: PacificCommunity/ofp-sam-bet-2026-stepwise
  MODEL_SOURCE_REF: main
  PROGRAM_PATH: /home/mfcl/mfclo64
  KFLOW_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@3313d6d769fb9f2027325bf0103e8cde42e482bd,mfclshiny=PacificCommunity/mfclshiny@f2dae97b55bb55c016627752c4ee1252a508cc8f
  KFLOW_REPO_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: always
  TUNA_FLOW_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS: "0"
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  CHECK_COMPACT_OUTPUTS: "true"
  CHECK_ENRICH_PAYLOADS: "true"
  CHECK_KEEP_RAW_OUTPUTS: "false"
  CHECK_FAIL_ON_FAILED_UNITS: "false"
  RETRO_PEELS: "1 2 3 4 5"
  N_MIXING_PERIODS: "2"
  RETRO_ALLOW_NEW_INI_VERSION_WRITE: "false"
  RETRO_USE_DOITALL: "auto"
  RETRO_MAKEPAR_START: "auto"
  RETRO_REMOVE_PAR_FILES: "auto"
  RETRO_START_PAR_NAME: "auto"
  RETRO_REWRITE_PAR: "auto"
output_patterns:
  - outputs/**
metadata:
  job_config:
    optional:
      - CHECK_TYPE
      - MODEL_SELECTOR
      - MODEL_INPUT_ROOT
      - MODEL_SOURCE_REPO
      - MODEL_SOURCE_REF
      - MODEL_SOURCE_PATH
      - MODEL_SOURCE_ROOT
      - MODEL_FINAL_PAR
      - CHECK_START_PAR_NAME
      - PROGRAM_PATH
      - FLOW_GROUP
      - FLOW_SPECIES
      - FLOW_SPECIES_LABEL
      - FLOW_ASSESSMENT_YEAR
      - CHECK_DRY_RUN
      - CHECK_SMOKE_ONLY
      - CHECK_BUILD_REPORT_FIGURES
      - CHECK_REPORT_FIGURE_KEYS
      - CHECK_RENDER_REVIEW_HTML
      - CHECK_COMPACT_OUTPUTS
      - CHECK_ENRICH_PAYLOADS
      - CHECK_KEEP_RAW_OUTPUTS
      - CHECK_FAIL_ON_FAILED_UNITS
      - RETRO_PEELS
      - RETRO_PEEL
      - N_MIXING_PERIODS
      - RETRO_ALLOW_NEW_INI_VERSION_WRITE
      - RETRO_USE_DOITALL
      - RETRO_MAKEPAR_START
      - RETRO_REMOVE_PAR_FILES
      - RETRO_START_PAR_NAME
      - RETRO_REWRITE_PAR
      - RETRO_COMMAND
      - MFK_RUN_MESSAGES
      - KFLOW_RUNTIME_UPDATE
      - TUNA_FLOW_RUNTIME_UPDATE
      - KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS
      - KFLOW_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_UPDATE
      - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
      - KFLOW_RUNTIME_GITHUB_AUTH
      - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
tags:
  stage: checks
  check_type: retro
