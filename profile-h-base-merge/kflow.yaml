name: ofp-sam-bet-2026-check-profile-h-base-merge
description: Merge independent h-base profile scalars and repair only invalid or jagged points.
command: bash run.sh
target_folder: profile-h-base-merge
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.4
resources:
  cpus: 4
  memory: 32GB
  disk: 20GB
env:
  CHECK_TYPE: profile-merge
  CHECK_MERGE_TYPE: profile
  MODEL_SELECTOR: ""
  MODEL_BASE_INPUT_JOB: ""
  BASE_MODEL_JOB: ""
  MODEL_ORIGINAL_BASE_INPUT_JOB: ""
  ATTACH_OUTPUT_MODE: full
  CHECK_INPUT_JOBS: ""
  ATTACH_CHECK_TYPES: profile
  PROGRAM_PATH: /home/mfcl/mfclo64
  KFLOW_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@55b54e9323bfcf19e7d9be05977e164ec91891e5,mfclshiny=PacificCommunity/mfclshiny@fec6d8d0fc52050b6123f7adbe285c31ec406826
  KFLOW_REPO_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: always
  TUNA_FLOW_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS: "0"
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  CHECK_COMPACT_OUTPUTS: "true"
  CHECK_ENRICH_PAYLOADS: "true"
  CHECK_KEEP_RAW_OUTPUTS: "false"
  PROFILE_INCLUDE_BASE_ANCHOR: "true"
  PROFILE_PARALLEL_MODE: h-base
  PROFILE_HBASE_ENABLED: "true"
  PROFILE_HBASE_ROLE: merge
  PROFILE_HBASE_REPAIR_PASSES: "2"
  PROFILE_HBASE_REPAIR_CPUS: "4"
  PROFILE_HBASE_REPAIR_MEMORY_GB: "32"
  PROFILE_HBASE_REPAIR_MEMORY_PER_WORKER_GB: "8"
  PROFILE_PRESET: three_stage
  PROFILE_VALUE_MODE: percent
  PROFILE_TARGET_VALUES: ""
  PROFILE_TARGET_CENTER: ""
  PROFILE_DOITALL_CONVERGENCE: "-3"
  PROFILE_CONVERGENCE_EXPONENT: "-3"
  PROFILE_MAX_GRAD_THRESHOLD: ""
  PROFILE_TARGET_REL_TOLERANCE: "0.001"
output_patterns:
  - outputs/**
metadata:
  job_config:
    optional:
      - CHECK_TYPE
      - CHECK_MERGE_TYPE
      - CHECK_COMPACT_OUTPUTS
      - CHECK_ENRICH_PAYLOADS
      - CHECK_KEEP_RAW_OUTPUTS
      - MODEL_SELECTOR
      - MODEL_BASE_INPUT_JOB
      - BASE_MODEL_JOB
      - MODEL_ORIGINAL_BASE_INPUT_JOB
      - ATTACH_OUTPUT_MODE
      - CHECK_INPUT_JOBS
      - ATTACH_CHECK_TYPES
      - MODEL_INPUT_ROOT
      - PROGRAM_PATH
      - FLOW_GROUP
      - FLOW_SPECIES
      - FLOW_SPECIES_LABEL
      - FLOW_ASSESSMENT_YEAR
      - CHECK_BUILD_REPORT_FIGURES
      - CHECK_REPORT_FIGURE_KEYS
      - CHECK_RENDER_REVIEW_HTML
      - PROFILE_TYPE
      - PROFILE_SPEC_VERSION
      - PROFILE_PRESET
      - PROFILE_NAME
      - PROFILE_LABEL
      - PROFILE_VALUES
      - PROFILE_QUANTITY
      - PROFILE_QUANTITY_TYPE
      - PROFILE_VALUE_MODE
      - PROFILE_TARGET_VALUES
      - PROFILE_TARGET_CENTER
      - PROFILE_BASE_QUANTITY
      - PROFILE_AF172
      - PROFILE_AF173
      - PROFILE_AF174
      - PROFILE_PARALLEL_MODE
      - PROFILE_HBASE_ENABLED
      - PROFILE_HBASE_ROLE
      - PROFILE_HBASE_BASE_JOB_ID
      - PROFILE_HBASE_PREP_JOB
      - PROFILE_HBASE_HESSIAN_JOBS
      - PROFILE_HBASE_CONDITION_CAP
      - PROFILE_HBASE_EIGEN_FLOOR_RELATIVE
      - PROFILE_HBASE_NEGATIVE_TOLERANCE
      - PROFILE_HBASE_MAX_QUADRATIC_STEP
      - PROFILE_HBASE_MAX_COORDINATE_STEP
      - PROFILE_HBASE_BASE_REL_TOLERANCE
      - PROFILE_HBASE_RESTART_BASE
      - PROFILE_HBASE_REPAIR_PASSES
      - PROFILE_HBASE_REPAIR_CPUS
      - PROFILE_HBASE_REPAIR_MEMORY_GB
      - PROFILE_HBASE_REPAIR_MEMORY_PER_WORKER_GB
      - PROFILE_EXECUTION_MODE
      - PROFILE_DOITALL_PENALTY
      - PROFILE_DOITALL_SCRIPT
      - PROFILE_DOITALL_CONVERGENCE
      - PROFILE_CONVERGENCE_EXPONENT
      - PROFILE_CENTER
      - PROFILE_INCLUDE_BASE_ANCHOR
      - PROFILE_EXPECTED_VALUES
      - PROFILE_MAX_GRAD_THRESHOLD
      - PROFILE_INVALID_RETRY_PASSES
      - PROFILE_JAGGED_REPAIR_PASSES
      - PROFILE_MAX_JAGGED_REPAIRS
      - PROFILE_TARGET_REL_TOLERANCE
      - MFK_RUN_MESSAGES
      - KFLOW_RUNTIME_UPDATE
      - TUNA_FLOW_RUNTIME_UPDATE
      - KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS
      - KFLOW_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_UPDATE
      - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
      - KFLOW_RUNTIME_GITHUB_AUTH
      - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
tags:
  stage: checks
  check_type: profile-merge
