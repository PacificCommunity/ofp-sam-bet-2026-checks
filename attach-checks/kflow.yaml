name: ofp-sam-bet-2026-check-attach-checks
description: Attach completed mfclkit check outputs to a fitted MFCL model bundle.
command: bash run.sh
target_folder: attach-checks
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.0
resources:
  cpus: 2
  memory: 12GB
  disk: 10GB
env:
  CHECK_TYPE: attach-checks
  MODEL_SOURCE_REPO: PacificCommunity/ofp-sam-bet-2026-stepwise
  MODEL_SOURCE_REF: main
  PROGRAM_PATH: /home/mfcl/mfclo64
  KFLOW_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@main,mfclshiny=PacificCommunity/mfclshiny@main
  KFLOW_REPO_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: always
  TUNA_FLOW_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS: "0"
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
output_patterns:
  - outputs/**
metadata:
  job_config:
    optional:
      - CHECK_TYPE
      - MODEL_SELECTOR
      - MODEL_INPUT_ROOT
      - MODEL_SOURCE_REPO
      - MODEL_SOURCE_REF
      - MODEL_SOURCE_PATH
      - MODEL_SOURCE_ROOT
      - PROGRAM_PATH
      - FLOW_GROUP
      - ATTACH_CHECK_TYPES
      - CHECK_TYPES
      - TRIGGER_NEXT
      - KFLOW_RUNTIME_UPDATE
      - TUNA_FLOW_RUNTIME_UPDATE
      - KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS
      - KFLOW_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_UPDATE
      - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
      - KFLOW_RUNTIME_GITHUB_AUTH
      - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
triggers:
  on_success:
    - key: results-from-attached-model
      report: ofp-sam-bet-2026-results
      input_jobs:
        - "{{ job.job_number }}"
      env:
        FLOW_GROUP: "{{ job.config.FLOW_GROUP }}"
        JOB_TITLE: BET results
        JOB_KEY: results
        JOB_DESCRIPTION: Build report-ready figures and tables from the attached model-check bundle.
        MODEL_SELECTOR: "{{ job.config.MODEL_SELECTOR }}"
        KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "{{ job.config.KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES }}"
        KFLOW_RUNTIME_UPDATE: "{{ job.config.KFLOW_RUNTIME_UPDATE }}"
        TUNA_FLOW_RUNTIME_UPDATE: "{{ job.config.TUNA_FLOW_RUNTIME_UPDATE }}"
        KFLOW_RUNTIME_PACKAGES: none
        KFLOW_REPO_RUNTIME_PACKAGES: none
        KFLOW_RUNTIME_GITHUB_AUTH: "{{ job.config.KFLOW_RUNTIME_GITHUB_AUTH }}"
        KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "{{ job.config.KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME }}"
      tags:
        auto: "true"
        stage: results
        source: attached-checks
tags:
  stage: checks
  check_type: attach-checks
