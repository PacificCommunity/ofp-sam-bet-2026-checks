name: ofp-sam-bet-2026-check-profile
description: Run mfclkit likelihood profile checks on a fitted MFCL model output.
command: bash run.sh
target_folder: profile
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.4
resources:
  cpus: 2
  memory: 8GB
  disk: 10GB
env:
  CHECK_TYPE: profile
  MODEL_SOURCE_REPO: PacificCommunity/ofp-sam-bet-2026-stepwise
  MODEL_SOURCE_REF: main
  PROGRAM_PATH: /home/mfcl/mfclo64
  KFLOW_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@037cf8083d0b62bb4dfe3a81b219b2a34bd6dcca,mfclshiny=PacificCommunity/mfclshiny@50af0245bdb9d184729ac411484c7ee20dd6f02c
  KFLOW_REPO_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: always
  TUNA_FLOW_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS: "0"
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  CHECK_COMPACT_OUTPUTS: "true"
  CHECK_ENRICH_PAYLOADS: "true"
  CHECK_KEEP_RAW_OUTPUTS: "false"
  CHECK_FAIL_ON_FAILED_UNITS: "false"
  PROFILE_TYPE: quantity
  # Generic three-stage native-MFCL profile: constrained fits followed by
  # one same-target, zero-penalty likelihood harvest.  Use `adaptive` only
  # when deliberately testing the older BET distance-scaled continuation.
  PROFILE_PRESET: three_stage
  PROFILE_STYLE: three_stage
  # The established continuation chains remain the conservative default.
  # For abundant Condor slots, explicitly set PROFILE_PARALLEL_MODE=scalars
  # together with PROFILE_EXECUTION_MODE=doitall to rebuild every point through
  # the model-specific phase sequence in its own job.
  PROFILE_PARALLEL_MODE: chains
  PROFILE_EXECUTION_MODE: continuation
  PROFILE_DOITALL_PENALTY: "10000000"
  PROFILE_DOITALL_SCRIPT: doitall.sh
  # Used when PROFILE_EXECUTION_MODE=doitall. This replaces only the last
  # model-defined mgc/parest flag 50 control in the staged doitall, leaving
  # earlier phase tuning intact. Use "-4" for 1e-4 if needed.
  PROFILE_DOITALL_CONVERGENCE: "-3"
  # PAREST flag 50 exponent for continuation-chain fits. -3 is John's usual
  # fast/moderate criterion; use -4 for a deliberately stricter final run.
  PROFILE_CONVERGENCE_EXPONENT: "-3"
  PROFILE_CHAIN: "true"
  PROFILE_CHAIN_SIDE: ""
  PROFILE_CENTER: "100"
  # Retain the unconstrained fitted model as the 100% anchor.  It is copied
  # from final.par rather than refit with a zero target or a profile penalty.
  PROFILE_INCLUDE_BASE_ANCHOR: "true"
  # AF172=0 requests total (not adult-only) average biomass.
  PROFILE_NAME: total_average_biomass
  PROFILE_QUANTITY: avg_bio
  PROFILE_VALUES: "60 65 70 75 80 85 90 95 105 110 115 120 125 130 135 140"
  PROFILE_AF172: "0"
  PROFILE_AF173: "0"
  PROFILE_AF174: "0"
  PROFILE_PENALTIES: "100000 1000000 10000000"
  PROFILE_RAMP_REPS: "50 50 2000"
  PROFILE_DISTANCE_BREAKS: "20 35"
  PROFILE_PENALTY_SCALES: "1 2 4"
  PROFILE_REPS_SCALES: "1 1.25 1.5"
  PROFILE_EXTRA_FAR_REFINE: "true"
  PROFILE_INCLUDE_FLAG55: "true"
  # A profile target is not valid until the constrained fit also converges.
  # Empty means derive the PAR acceptance threshold from the exponent above
  # (for example, -3 -> 0.001). It can still be overridden independently.
  PROFILE_MAX_GRAD_THRESHOLD: ""
  PROFILE_TARGET_REL_TOLERANCE: "0.001"
  PROFILE_RETRY_INVALID: "true"
  PROFILE_RETRY_JAGGED: "true"
  PROFILE_CONTINUATION_REPS: "1000"
  PROFILE_JAGGED_TOLERANCE: "0.1"
  PROFILE_INVALID_RETRY_PASSES: "3"
  PROFILE_JAGGED_REPAIR_PASSES: "3"
output_patterns:
  - outputs/**
metadata:
  job_config:
    optional:
      - CHECK_TYPE
      - MODEL_SELECTOR
      - MODEL_INPUT_ROOT
      - MODEL_SOURCE_REPO
      - MODEL_SOURCE_REF
      - MODEL_SOURCE_PATH
      - MODEL_SOURCE_ROOT
      - MODEL_FINAL_PAR
      - CHECK_START_PAR_NAME
      - PROGRAM_PATH
      - FLOW_GROUP
      - FLOW_SPECIES
      - FLOW_SPECIES_LABEL
      - FLOW_ASSESSMENT_YEAR
      - CHECK_DRY_RUN
      - CHECK_SMOKE_ONLY
      - CHECK_BUILD_REPORT_FIGURES
      - CHECK_REPORT_FIGURE_KEYS
      - CHECK_RENDER_REVIEW_HTML
      - CHECK_COMPACT_OUTPUTS
      - CHECK_ENRICH_PAYLOADS
      - CHECK_KEEP_RAW_OUTPUTS
      - CHECK_FAIL_ON_FAILED_UNITS
      - PROFILE_TYPE
      - PROFILE_STYLE
      - PROFILE_PRESET
      - PROFILE_RUNNER
      - PROFILE_USE_RAMP
      - PROFILE_PARALLEL_MODE
      - PROFILE_EXECUTION_MODE
      - PROFILE_DOITALL_PENALTY
      - PROFILE_DOITALL_SCRIPT
      - PROFILE_CHAIN
      - PROFILE_CHAIN_SIDE
      - PROFILE_CENTER
      - PROFILE_INCLUDE_BASE_ANCHOR
      - PROFILE_SPEC_VERSION
      - PROFILE_NAME
      - PROFILE_LABEL
      - PROFILE_VALUES
      - PROFILE_EXPECTED_VALUES
      - PROFILE_QUANTITY
      - PROFILE_QUANTITY_TYPE
      - PROFILE_BASE_QUANTITY
      - PROFILE_AF172
      - PROFILE_AF173
      - PROFILE_AF174
      - PROFILE_PENALTY
      - PROFILE_PENALTIES
      - PROFILE_RAMP_PENALTIES
      - PROFILE_PENALTY_SCHEDULE
      - PROFILE_REPS
      - PROFILE_RAMP_REPS
      - PROFILE_DISTANCE_BREAKS
      - PROFILE_RAMP_DISTANCE_BREAKS
      - PROFILE_PENALTY_SCALES
      - PROFILE_RAMP_PENALTY_SCALES
      - PROFILE_REPS_SCALES
      - PROFILE_RAMP_REPS_SCALES
      - PROFILE_EXTRA_FAR_REFINE
      - PROFILE_RAMP_EXTRA_FAR_REFINE
      - PROFILE_INCLUDE_FLAG55
      - PROFILE_INCLUDE_LEGACY_FLAG55
      - PROFILE_DOITALL_CONVERGENCE
      - PROFILE_CONVERGENCE_EXPONENT
      - PROFILE_MAX_GRAD_THRESHOLD
      - PROFILE_TARGET_REL_TOLERANCE
      - PROFILE_RETRY_INVALID
      - PROFILE_RETRY_JAGGED
      - PROFILE_CONTINUATION_REPS
      - PROFILE_JAGGED_TOLERANCE
      - PROFILE_INVALID_RETRY_PASSES
      - PROFILE_JAGGED_REPAIR_PASSES
      - PROFILE_EXTRA_SWITCH
      - PROFILE_PARAMETER
      - PROFILE_APPLY_SCRIPT
      - MFK_RUN_MESSAGES
      - KFLOW_RUNTIME_UPDATE
      - TUNA_FLOW_RUNTIME_UPDATE
      - KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS
      - KFLOW_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_UPDATE
      - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
      - KFLOW_RUNTIME_GITHUB_AUTH
      - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
tags:
  stage: checks
  check_type: profile
