name: ofp-sam-bet-2026-check-profile
description: Run mfclkit likelihood profile checks on a fitted MFCL model output.
command: bash run.sh
target_folder: profile
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.1
resources:
  cpus: 2
  memory: 12GB
  disk: 10GB
env:
  CHECK_TYPE: profile
  MODEL_SOURCE_REPO: PacificCommunity/ofp-sam-bet-2026-stepwise
  MODEL_SOURCE_REF: main
  PROGRAM_PATH: /home/mfcl/mfclo64
  KFLOW_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@main,mfclshiny=PacificCommunity/mfclshiny@main
  KFLOW_REPO_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: always
  TUNA_FLOW_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS: "0"
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  CHECK_COMPACT_OUTPUTS: "true"
  CHECK_ENRICH_PAYLOADS: "true"
  CHECK_KEEP_RAW_OUTPUTS: "false"
  CHECK_FAIL_ON_FAILED_UNITS: "true"
  PROFILE_TYPE: quantity
  PROFILE_STYLE: bet
  PROFILE_PARALLEL_MODE: chains
  PROFILE_CHAIN: "true"
  PROFILE_CHAIN_SIDE: ""
  PROFILE_CENTER: "100"
  PROFILE_INCLUDE_BASE_ANCHOR: "false"
  PROFILE_NAME: adult_biomass
  PROFILE_QUANTITY: avg_bio
  PROFILE_VALUES: "60 65 70 75 80 85 90 95 105 110 115 120 125 130 135 140"
  PROFILE_AF172: "0"
  PROFILE_AF173: "0"
  PROFILE_AF174: "0"
  PROFILE_PENALTIES: "50000 500000 5000000"
  PROFILE_RAMP_REPS: "5 10 15 200 50 200"
  PROFILE_DISTANCE_BREAKS: "20 35"
  PROFILE_PENALTY_SCALES: "1 2 4"
  PROFILE_REPS_SCALES: "1 1.25 1.5"
  PROFILE_EXTRA_FAR_REFINE: "true"
  PROFILE_INCLUDE_FLAG55: "true"
output_patterns:
  - outputs/**
metadata:
  job_config:
    optional:
      - CHECK_TYPE
      - MODEL_SELECTOR
      - MODEL_INPUT_ROOT
      - MODEL_SOURCE_REPO
      - MODEL_SOURCE_REF
      - MODEL_SOURCE_PATH
      - MODEL_SOURCE_ROOT
      - MODEL_FINAL_PAR
      - CHECK_START_PAR_NAME
      - PROGRAM_PATH
      - FLOW_GROUP
      - CHECK_DRY_RUN
      - CHECK_SMOKE_ONLY
      - CHECK_BUILD_REPORT_FIGURES
      - CHECK_REPORT_FIGURE_KEYS
      - CHECK_RENDER_REVIEW_HTML
      - CHECK_COMPACT_OUTPUTS
      - CHECK_ENRICH_PAYLOADS
      - CHECK_KEEP_RAW_OUTPUTS
      - CHECK_FAIL_ON_FAILED_UNITS
      - PROFILE_TYPE
      - PROFILE_STYLE
      - PROFILE_RUNNER
      - PROFILE_USE_RAMP
      - PROFILE_PARALLEL_MODE
      - PROFILE_CHAIN
      - PROFILE_CHAIN_SIDE
      - PROFILE_CENTER
      - PROFILE_INCLUDE_BASE_ANCHOR
      - PROFILE_NAME
      - PROFILE_LABEL
      - PROFILE_VALUES
      - PROFILE_QUANTITY
      - PROFILE_QUANTITY_TYPE
      - PROFILE_BASE_QUANTITY
      - PROFILE_AF172
      - PROFILE_AF173
      - PROFILE_AF174
      - PROFILE_PENALTY
      - PROFILE_PENALTIES
      - PROFILE_RAMP_PENALTIES
      - PROFILE_PENALTY_SCHEDULE
      - PROFILE_REPS
      - PROFILE_RAMP_REPS
      - PROFILE_DISTANCE_BREAKS
      - PROFILE_RAMP_DISTANCE_BREAKS
      - PROFILE_PENALTY_SCALES
      - PROFILE_RAMP_PENALTY_SCALES
      - PROFILE_REPS_SCALES
      - PROFILE_RAMP_REPS_SCALES
      - PROFILE_EXTRA_FAR_REFINE
      - PROFILE_RAMP_EXTRA_FAR_REFINE
      - PROFILE_INCLUDE_FLAG55
      - PROFILE_INCLUDE_LEGACY_FLAG55
      - PROFILE_EXTRA_SWITCH
      - PROFILE_PARAMETER
      - PROFILE_APPLY_SCRIPT
      - MFK_RUN_MESSAGES
      - KFLOW_RUNTIME_UPDATE
      - TUNA_FLOW_RUNTIME_UPDATE
      - KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS
      - KFLOW_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_UPDATE
      - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
      - KFLOW_RUNTIME_GITHUB_AUTH
      - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
tags:
  stage: checks
  check_type: profile
