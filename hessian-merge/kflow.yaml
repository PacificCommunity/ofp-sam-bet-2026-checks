name: ofp-sam-bet-2026-check-hessian-merge
description: Merge split mfclkit Hessian parts and optionally publish an independent attached diagnostic delta.
command: bash run.sh
target_folder: hessian-merge
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.2
resources:
  cpus: 1
  memory: 4GB
  disk: 10GB
env:
  CHECK_TYPE: hessian_merge
  MODEL_SELECTOR: ""
  MODEL_BASE_INPUT_JOB: ""
  BASE_MODEL_JOB: ""
  MODEL_ORIGINAL_BASE_INPUT_JOB: ""
  ATTACH_OUTPUT_MODE: full
  CHECK_INPUT_JOBS: ""
  ATTACH_CHECK_TYPES: hessian
  PROGRAM_PATH: /home/mfcl/mfclo64
  KFLOW_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@dfb70989557d5afd6f7eed06e247b8347f7a2767,mfclshiny=PacificCommunity/mfclshiny@112fd8968745ecbbb8d881914924ee0bb2085ab2
  KFLOW_REPO_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: always
  TUNA_FLOW_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS: "0"
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  HESSIAN_NSPLIT: "30"
  HESSIAN_MERGE_RUN: "true"
  HESSIAN_MERGE_EIGEN: "true"
  HESSIAN_KEEP_MATRIX: "false"
  CHECK_COMPACT_OUTPUTS: "true"
  CHECK_KEEP_RAW_OUTPUTS: "false"
output_patterns:
  - outputs/**
metadata:
  job_config:
    optional:
      - CHECK_TYPE
      - MODEL_SELECTOR
      - MODEL_BASE_INPUT_JOB
      - BASE_MODEL_JOB
      - MODEL_ORIGINAL_BASE_INPUT_JOB
      - CHECK_INPUT_JOBS
      - ATTACH_CHECK_TYPES
      - MODEL_INPUT_ROOT
      - PROGRAM_PATH
      - FLOW_GROUP
      - FLOW_SPECIES
      - FLOW_SPECIES_LABEL
      - FLOW_ASSESSMENT_YEAR
      - HESSIAN_NSPLIT
      - HESSIAN_MERGE_RUN
      - HESSIAN_MERGE_EIGEN
      - HESSIAN_KEEP_MATRIX
      - ATTACH_OUTPUT_MODE
      - CHECK_COMPACT_OUTPUTS
      - CHECK_KEEP_RAW_OUTPUTS
      - MFK_RUN_MESSAGES
      - KFLOW_RUNTIME_UPDATE
      - TUNA_FLOW_RUNTIME_UPDATE
      - KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS
      - KFLOW_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_UPDATE
      - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
      - KFLOW_RUNTIME_GITHUB_AUTH
      - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
tags:
  stage: checks
  check_type: hessian-merge
