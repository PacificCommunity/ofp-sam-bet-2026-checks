name: ofp-sam-bet-2026-check-aspm-merge
description: Merge mfclkit ASPM outputs and optionally publish an independent attached diagnostic delta.
command: bash run.sh
target_folder: aspm-merge
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.5@sha256:c87f1f6d9d4f62dc447844b58afe35f96af175bf933cb6cffbbbe39a59172360
resources:
  cpus: 1
  memory: 4GB
  disk: 10GB
env:
  CHECK_TYPE: aspm-merge
  CHECK_MERGE_TYPE: aspm
  CHECK_EXPECTED_UNIT_TYPE: ""
  CHECK_EXPECTED_UNITS: ""
  MODEL_SELECTOR: ""
  MODEL_BASE_INPUT_JOB: ""
  BASE_MODEL_JOB: ""
  MODEL_ORIGINAL_BASE_INPUT_JOB: ""
  ATTACH_OUTPUT_MODE: full
  CHECK_INPUT_JOBS: ""
  ATTACH_CHECK_TYPES: aspm
  PROGRAM_PATH: /home/mfcl/mfclo64
  KFLOW_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@a0fe04b12bb1d570176aacbd8b38c1d6feb79a9a,mfclshiny=PacificCommunity/mfclshiny@db11d83fa3854c571a634aa289c56ac8981d2e53
  KFLOW_REPO_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: always
  TUNA_FLOW_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS: "0"
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  CHECK_COMPACT_OUTPUTS: "true"
  CHECK_ENRICH_PAYLOADS: "true"
  CHECK_KEEP_RAW_OUTPUTS: "false"
output_patterns:
  - outputs/**
metadata:
  job_config:
    optional:
      - CHECK_TYPE
      - CHECK_MERGE_TYPE
      - CHECK_EXPECTED_UNIT_TYPE
      - CHECK_EXPECTED_UNITS
      - CHECK_COMPACT_OUTPUTS
      - CHECK_ENRICH_PAYLOADS
      - CHECK_KEEP_RAW_OUTPUTS
      - MODEL_SELECTOR
      - MODEL_BASE_INPUT_JOB
      - BASE_MODEL_JOB
      - MODEL_ORIGINAL_BASE_INPUT_JOB
      - ATTACH_OUTPUT_MODE
      - CHECK_INPUT_JOBS
      - ATTACH_CHECK_TYPES
      - MODEL_INPUT_ROOT
      - PROGRAM_PATH
      - FLOW_GROUP
      - FLOW_SPECIES
      - FLOW_SPECIES_LABEL
      - FLOW_ASSESSMENT_YEAR
      - CHECK_BUILD_REPORT_FIGURES
      - CHECK_REPORT_FIGURE_KEYS
      - CHECK_RENDER_REVIEW_HTML
      - ASPM_MAX_EVALS
      - ASPM_FIX_SELECTIVITY
      - ASPM_LF_FLAG_311
      - ASPM_WF_FLAG_301
      - ASPM_MIN_LF_SAMPLE_SIZE
      - ASPM_MIN_WF_SAMPLE_SIZE
      - ASPM_OUTPUT_PAR
      - ASPM_EXTRA_SWITCH_LINES
      - MFK_RUN_MESSAGES
      - KFLOW_RUNTIME_UPDATE
      - TUNA_FLOW_RUNTIME_UPDATE
      - KFLOW_RUNTIME_UPDATE_INTERVAL_HOURS
      - KFLOW_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_PACKAGES
      - KFLOW_REPO_RUNTIME_UPDATE
      - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
      - KFLOW_RUNTIME_GITHUB_AUTH
      - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
tags:
  stage: checks
  check_type: aspm-merge
